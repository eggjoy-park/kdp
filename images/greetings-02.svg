<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-labelledby="t02">
  <title id="t02">Person bowing with hands pressed together in gratitude</title>
  <rect width="240" height="240" fill="#fff4e6"/>
  <rect y="170" width="240" height="70" fill="#ffe8d6"/>
  <!-- Floating hearts -->
  <path d="M 60 60 q -6 -10 -14 -4 q -6 6 0 14 l 14 14 l 14 -14 q 6 -8 0 -14 q -8 -6 -14 4 z" fill="#ec4899" opacity="0.85"/>
  <path d="M 180 50 q -5 -8 -12 -3 q -5 5 0 12 l 12 12 l 12 -12 q 5 -7 0 -12 q -7 -5 -12 3 z" fill="#f97316" opacity="0.7"/>
  <!-- Character -->
  <g transform="translate(0 8)">
    <path d="M 88 78 Q 120 46 152 78 L 150 88 Q 120 62 90 88 Z" fill="#3b2417"/>
    <circle cx="120" cy="92" r="28" fill="#fcd9b6"/>
    <!-- Closed grateful eyes -->
    <path d="M 108 90 q 4 -4 8 0" stroke="#1f2937" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 124 90 q 4 -4 8 0" stroke="#1f2937" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 112 103 Q 120 110 128 103" stroke="#1f2937" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <circle cx="106" cy="100" r="4" fill="#fca5a5" opacity="0.7"/>
    <circle cx="134" cy="100" r="4" fill="#fca5a5" opacity="0.7"/>
    <!-- Body -->
    <path d="M 90 122 Q 120 115 150 122 L 155 175 L 85 175 Z" fill="#14b8a6"/>
    <!-- Hands pressed together -->
    <ellipse cx="120" cy="135" rx="11" ry="16" fill="#fcd9b6"/>
    <path d="M 109 132 Q 120 128 131 132" stroke="#1f2937" stroke-width="1.5" fill="none" opacity="0.4"/>
  </g>
</svg>
