<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-labelledby="e01t">
  <title id="e01t">Person raising one hand and calling out for urgent help</title>
  <rect width="240" height="240" fill="#fff4e6"/>
  <rect y="170" width="240" height="70" fill="#ffe8d6"/>
  <!-- Exclamation marks -->
  <text x="60" y="55" text-anchor="middle" font-size="32" fill="#ec4899" font-family="sans-serif" font-weight="bold">!</text>
  <text x="195" y="50" text-anchor="middle" font-size="28" fill="#f97316" font-family="sans-serif" font-weight="bold">!</text>
  <text x="170" y="90" text-anchor="middle" font-size="22" fill="#f97316" font-family="sans-serif" font-weight="bold">!</text>
  <!-- Sweat drop -->
  <path d="M 60 75 q -4 8 0 12 q 4 -4 0 -12 z" fill="#14b8a6" opacity="0.8"/>
  <!-- Character -->
  <g>
    <!-- Hair -->
    <path d="M 88 78 Q 120 46 152 78 L 150 88 Q 120 62 90 88 Z" fill="#6b4423"/>
    <circle cx="120" cy="92" r="28" fill="#fcd9b6"/>
    <!-- Worried eyes (wide circles with smaller pupil) -->
    <circle cx="108" cy="92" r="6" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
    <circle cx="110" cy="93" r="2.5" fill="#1f2937"/>
    <circle cx="132" cy="92" r="6" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
    <circle cx="130" cy="93" r="2.5" fill="#1f2937"/>
    <!-- Open mouth (small 'O') -->
    <ellipse cx="120" cy="108" rx="4" ry="5" fill="#1f2937"/>
    <!-- Body -->
    <rect x="92" y="122" width="56" height="58" rx="10" fill="#ec4899"/>
    <!-- Raised arm -->
    <path d="M 148 130 Q 175 80 165 35" stroke="#fcd9b6" stroke-width="13" fill="none" stroke-linecap="round"/>
    <circle cx="165" cy="30" r="10" fill="#fcd9b6"/>
    <!-- Open hand (fingers) -->
    <path d="M 158 22 L 158 14 M 165 20 L 165 12 M 172 22 L 172 14" stroke="#fcd9b6" stroke-width="3" stroke-linecap="round"/>
    <!-- Lower arm -->
    <path d="M 92 130 Q 80 145 92 165" stroke="#fcd9b6" stroke-width="13" fill="none" stroke-linecap="round"/>
  </g>
</svg>
