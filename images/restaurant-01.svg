<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-labelledby="r01t">
  <title id="r01t">Smiling diner enjoying a hot Korean meal</title>
  <rect width="240" height="240" fill="#fff4e6"/>
  <!-- Table -->
  <rect y="170" width="240" height="70" fill="#ffe8d6"/>
  <rect y="170" width="240" height="6" fill="#f97316" opacity="0.4"/>
  <!-- Steam from bowl -->
  <path d="M 100 95 q -6 -10 0 -20 q 6 -10 0 -20" stroke="#fcd9b6" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M 120 90 q -6 -10 0 -20 q 6 -10 0 -20" stroke="#fcd9b6" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M 140 95 q -6 -10 0 -20 q 6 -10 0 -20" stroke="#fcd9b6" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- Heart bubble -->
  <path d="M 175 70 q -5 -8 -12 -3 q -5 5 0 12 l 12 12 l 12 -12 q 5 -7 0 -12 q -7 -5 -12 3 z" fill="#ec4899" opacity="0.85"/>
  <!-- Bowl -->
  <ellipse cx="120" cy="155" rx="42" ry="10" fill="#6b4423"/>
  <path d="M 80 155 Q 85 178 120 178 Q 155 178 160 155 Z" fill="#f97316"/>
  <ellipse cx="120" cy="155" rx="38" ry="6" fill="#ec4899"/>
  <!-- Chopsticks -->
  <rect x="135" y="130" width="3" height="35" fill="#6b4423" transform="rotate(15 136 147)"/>
  <rect x="142" y="130" width="3" height="35" fill="#6b4423" transform="rotate(15 143 147)"/>
  <!-- Character behind table -->
  <g>
    <path d="M 70 78 Q 95 50 120 78 L 118 88 Q 95 64 72 88 Z" fill="#3b2417"/>
    <circle cx="95" cy="92" r="22" fill="#fcd9b6"/>
    <!-- Closed happy eyes (upward arcs) -->
    <path d="M 84 90 q 4 -4 8 0" stroke="#1f2937" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 98 90 q 4 -4 8 0" stroke="#1f2937" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Big smile -->
    <path d="M 86 100 Q 95 108 104 100" stroke="#1f2937" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <circle cx="82" cy="98" r="3" fill="#fca5a5" opacity="0.7"/>
    <circle cx="108" cy="98" r="3" fill="#fca5a5" opacity="0.7"/>
    <!-- Body -->
    <rect x="73" y="118" width="44" height="40" rx="8" fill="#14b8a6"/>
  </g>
</svg>
